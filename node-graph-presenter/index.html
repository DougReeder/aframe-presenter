<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Node Graph Presenter</title>
    <meta name="description" content="present a node graph to a group using the Multisynq network">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <script src="https://unpkg.com/@multisynq/client@1.1.0/bundled/multisynq-client.min.js"></script>
    <script crossorigin src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
<!--    <script src="../src-dev/aframe-croquet-component.js"></script></head>-->
    <script src="https://cdn.jsdelivr.net/gh/DougReeder/aframe-croquet-component@class-sync/public/lib/aframe-croquet-component.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.7.0/dist/aframe-extras.loaders.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.7.0/dist/aframe-extras.controls.min.js"></script>
    <script src="https://unpkg.com/aframe-orbit-controls@1.3.2/dist/aframe-orbit-controls.min.js"></script>
    <script src="https://unpkg.com/aframe-simple-sun-sky@^1.2.3/simple-sun-sky.js"></script>
    <script src="https://unpkg.com/papaparse@5.5.3/papaparse.min.js"></script>
    <script src="../node-graph-presenter/graphUtil.js"></script>
    <script src="../node-graph-presenter/graph-node.js"></script>
    <script src="../node-graph-presenter/graph-edge.js"></script>
    <script src="../src/schedulerYield.js"></script>
    <script src="../node-graph-presenter/selectable-node-graph.js"></script>
    <script src="../src/aframe-presenter.js"></script>
    <link rel="prefetch" as="script" href="../node-graph-presenter/build/graphWorker.js">
</head>
<body>

<a-scene debug fog="type: exponential; density:0.1; color: #444; near: 3"
         raycaster="interval: 100; objects: .presentation" cursor__mouse="rayOrigin: mouse" cursor__xrselect="rayOrigin: xrselect"
         croquet="eventRateLimit: 60; tps: 45; spawnPoint: 0 0 0; ">
    <a-assets timeout="10000">
        <a-asset-item id="avatarModel" src="../assets/low_poly_head_with_hair_free_download.glb"></a-asset-item>
        <a-asset-item id="pointerModel" src="../assets/pointer_cone.glb"></a-asset-item>
        <img id="floorTexture" src="../assets/floor_tiles_08_diff_2k.jpg">
        <img id="floorNormalMap" src="../assets/floor_tiles_08_nor_gl_2k.jpg">
        <img id="floorAmbientOcclusionMap" src="../assets/floor_tiles_08_ao_2k.jpg">
        <a-asset-item id="timberPlantPot" src="../assets/Timber_Plant_Pot.glb"></a-asset-item>
        <a-asset-item id="pompeiiLightGreyDoubleSofa" src="../assets/PompeiiLightGreyDoubleSofa.glb"></a-asset-item>
        <a-asset-item id="lowPolyWoodenTable" src="../assets/low_poly_wooden_table.glb"></a-asset-item>
        <a-asset-item id="partitionPanel" src="../assets/partition_panel.glb"></a-asset-item>
        <img id="key-SPDX-primitives" src="../assets/key-SPDX-primitives.png">
        <img id="key-SPDX-line-colors" src="../assets/key-SPDX-line-colors.png">
    </a-assets>

    <a-entity id="presentation" selectable-node-graph multiuser></a-entity>

    <a-presenter id="presenter" presentationId="presentation" pointerModelId="pointerModel" fly="false" tps="60"></a-presenter>

    <a-entity id="floor" geometry="primitive: plane; height: 100; width: 100;" rotation="-90 0 0"
              material="src: #floorTexture; repeat: 100 100; normalMap: #floorNormalMap; normalTextureRepeat: 100 100; ambientOcclusionMap: #floorAmbientOcclusionMap; ambientOcclusionTextureRepeat: 100 100; "></a-entity>

    <a-gltf-model id="plantPot" src="#timberPlantPot" position="-3.75 -0.06 -3.75" rotation="0 45 0" scale="0.03 0.02 0.03"></a-gltf-model>
    <a-gltf-model id="panel" src="#partitionPanel" position="3.5 0 -3.5" rotation="0 -45 0" scale="0.025 0.01 0.01"></a-gltf-model>
    <a-image src="#key-SPDX-primitives" height="1.5" width="0.84375" position="2.355 1.057 -4.641" rotation="0 -45 0"></a-image>
    <a-image src="#key-SPDX-line-colors" height="1.5" width="0.84375" position="2.831 1.057 -4.154" rotation="0 -45 0"></a-image>
    <a-gltf-model id="woodenTable" src="#lowPolyWoodenTable" position="3.75 0 3.75" rotation="0 -45 0" scale="25 20 25"></a-gltf-model>
    <a-gltf-model id="greySofa" src="#pompeiiLightGreyDoubleSofa" position="-3.5 0 3.5" rotation="0 135 0" scale="1.75 1.25 1"></a-gltf-model>

    <a-simple-sun-sky sun-position="-0.62 0.8 1" fog-color="#8c8c8c" light-color="#1288df" dark-color="#0f5083" sun-color="#c1bdb9" radius="1100"></a-simple-sun-sky>
</a-scene>

<template id="avatarTemplate">
    <a-entity>   <!-- This entity's location and rotation are set from the other user's camera -->
        <a-entity gltf-model="#avatarModel" scale="0.004 0.004 0.004" rotation="-12 0 0" position="0 0 0"></a-entity>
    </a-entity>
</template>
</body>
</html>
