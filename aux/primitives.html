<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>A-Frame Primitives</title>
    <script crossorigin src="https://aframe.io/releases/1.8.0/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-simple-sun-sky@^1.2.3/simple-sun-sky.js"></script>
</head>
<body>
<a-scene >
    <a-octahedron position="0 12 0" radius="0.9" rotation="-50 20 0" color="gray"></a-octahedron>

    <a-tetrahedron position="0 8 0" radius="1.1" color="gray"></a-tetrahedron>
    <a-sphere position="0 6 0" radius="0.75" color="gray"></a-sphere>
    <a-box position="0 4 0" rotation="30 30 0" color="gray"></a-box>
    <a-dodecahedron position="0 2 0" radius="0.8" color="gray"></a-dodecahedron>
    <a-icosahedron position="0 0 0" radius="0.83" color="gray"></a-icosahedron>
    <a-cone position="0 -2 0" height="1.5" radius-bottom="0.75" rotation="10 0 0" color="gray"></a-cone>
    <a-cylinder position="0 -4 0" height="1.2" radius="0.7" rotation="10 0 0" color="gray"></a-cylinder>
    <a-torus position="0 -6 0" rotation="-60 0 0" radius="0.5" radius-tubular="0.15" color="gray"></a-torus>
    <a-triangle vertex-a="-0.8 -8.6 0" vertex-b="0.8 -8.6 0" vertex-c="0 -7.4 0" color="gray"></a-triangle>
    <a-ring position="0 -10 0" radius-outer="0.75" radius-inner="0.4" color="gray"></a-ring>
    <a-torus-knot position="0 -12 0" radius="0.5" radius-tubular="0.09" color="gray"></a-torus-knot>

    <a-sky color="white"></a-sky>
<!--    <a-simple-sun-sky sun-position="1 0.1 0"></a-simple-sun-sky>-->

    <a-entity camera look-controls wasd-controls position="0 0 20" ></a-entity>
</a-scene>


</body>
</html>
